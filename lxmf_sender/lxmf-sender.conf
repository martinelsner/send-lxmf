# send-lxmf configuration
#
# This file is read from /etc/send-lxmf.conf
# Copy this file there and uncomment the options you need.
#
# Lines starting with '#' are comments.
# Option names are case-sensitive and match command-line arguments.

[send-lxmf]
# Default LXMF destination address (sendmail-lxmf only).
# Used when the recipient is not a valid LXMF hash (e.g. root@localhost).
# This is the only required option for sendmail-lxmf.
# default-destination = b9af7034186731b9f009d06795172a36

# Data directory for identity and LXMF router storage.
# If not set, each user gets their own (stored under ~/.local/share/send-lxmf).
# If set, all send-lxmf invocations share the same identity, so messages
# will appear to come from the same sender regardless of which user called it.
# data-dir = /var/lib/reticulum/send-lxmf

# Reticulum config directory.
# If not specified, Reticulum uses its default location.
# rnsconfig = /var/lib/reticulum/rnsd

# Propagation node for store-and-forward delivery.
# Used when direct delivery fails (recipient offline).
# propagation-node = a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4

# Sender display name.
# display-name = My Sendmail

# Prepend title to message body (default: true).
# prepend-title = true

# Timeout in seconds for delivery attempts.
# timeout = 15