# send-lxmf configuration file
#
# This file is read from /var/lib/send-lxmf/config by default.
# Command-line arguments override the values set here.

# Display name used when announcing the sender identity to the network.
# Corresponds to the --display-name command-line argument.
# Example: display_name = Alice
# display_name =

# Default recipient LXMF address. Used when no destination is provided
# on the command line. Corresponds to the positional "destination" argument.
# Can be a single 32-character hex hash.
# Example: destination = b9af7034186731b9f009d06795172a36
# destination =

# Propagation node to fall back to when direct delivery fails.
# Corresponds to the --propagation-node command-line argument.
# Should be a 32-character hex hash.
# Example: propagation_node = a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4
# propagation_node =