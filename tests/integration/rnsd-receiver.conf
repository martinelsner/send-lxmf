# Reticulum config for Container B (receiver)
# BackboneInterface connecting to Container A's listener

[reticulum]
  enable_transport = yes
  share_instance = yes
  instance_name = default

[logging]
  loglevel = 5

[interfaces]
  [[Backbone to Node A]]
    type = BackboneInterface
    enabled = yes
    target_host = node_a
    target_port = 5377
