# Reticulum config for Container A (sender)
# BackboneInterface in listener mode on port 5377

[reticulum]
  enable_transport = yes
  share_instance = yes
  instance_name = default

[logging]
  loglevel = 5

[interfaces]
  [[Backbone Listener]]
    type = BackboneInterface
    enabled = yes
    listen_ip = 0.0.0.0
    listen_port = 5377
